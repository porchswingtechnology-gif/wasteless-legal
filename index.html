<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteLess — Legal</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 560px;
            margin: 0 auto;
            padding: 64px 24px;
            line-height: 1.55;
            color: #1a1a1a;
            background: #fafafa;
        }
        @media (prefers-color-scheme: dark) {
            body { color: #ececec; background: #0d0d0d; }
            a { color: #5ec07a; }
            .card { background: #1a1a1a; border-color: #2a2a2a; }
        }
        h1 { font-size: 32px; margin-bottom: 6px; }
        .tagline { color: #888; font-size: 15px; margin-bottom: 32px; }
        .card {
            display: block;
            padding: 18px 20px;
            margin-bottom: 12px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            background: #fff;
            text-decoration: none;
            color: inherit;
        }
        .card-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #2e7d3f;
        }
        .card-desc { font-size: 13px; color: #666; }
        .leaf { color: #2e7d3f; }
    </style>
</head>
<body>
    <h1><span class="leaf">Waste</span><em>Less</em></h1>
    <p class="tagline">Legal documents for the WasteLess iOS app.</p>

    <a href="privacy.html" class="card">
        <div class="card-title">Privacy Policy</div>
        <div class="card-desc">What data we collect and how we use it.</div>
    </a>

    <a href="terms.html" class="card">
        <div class="card-title">Terms of Use</div>
        <div class="card-desc">Subscription terms, acceptable use, disclaimers.</div>
    </a>
</body>
</html>
